<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Syntax Analyzer - Dark Theme</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background: #0d1117;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        background: #161b22;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        border: 1px solid #30363d;
      }

      .header {
        background: #0d1117;
        color: #c9d1d9;
        padding: 30px;
        text-align: center;
        border-bottom: 1px solid #30363d;
      }

      .header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .header p {
        opacity: 0.9;
        color: #8b949e;
      }

      .main-content {
        padding: 30px;
      }

      .input-section {
        margin-bottom: 30px;
      }

      .language-selector {
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .language-selector label {
        font-weight: 600;
        color: #c9d1d9;
      }

      .language-selector select {
        padding: 10px 20px;
        border: 1px solid #30363d;
        border-radius: 6px;
        font-size: 16px;
        background: #0d1117;
        color: #c9d1d9;
        cursor: pointer;
        transition: border-color 0.3s;
      }

      .language-selector select:hover {
        border-color: #58a6ff;
      }

      .language-selector select:focus {
        outline: none;
        border-color: #58a6ff;
      }

      /* Code editor with line numbers */
      .code-editor-container {
        display: flex;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        overflow: hidden;
        font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace;
        font-size: 14px;
        line-height: 1.6;
        min-height: 400px;
      }

      .line-numbers {
        padding: 20px 10px;
        background: #0a0c10;
        color: #6e7681;
        text-align: right;
        border-right: 1px solid #30363d;
        user-select: none;
        min-width: 50px;
        font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace;
        font-size: 14px;
        line-height: 1.6;
        white-space: pre;
      }

      .code-input {
        flex: 1;
        padding: 20px;
        background: #0d1117;
        color: #c9d1d9;
        border: none;
        font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace;
        font-size: 14px;
        line-height: 1.6;
        resize: vertical;
        min-height: 400px;
        outline: none;
      }

      .code-input:focus {
        background: #0a0c10;
      }

      .button-group {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 12px 30px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .btn-primary {
        background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
        color: white;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #2ea043 0%, #3fb950 100%);
      }

      .btn-secondary {
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
      }

      .btn-secondary:hover {
        background: #30363d;
      }

      .file-input {
        display: none;
      }

      .file-label {
        padding: 12px 30px;
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        display: inline-block;
      }

      .file-label:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        background: #30363d;
      }

      .results-section {
        margin-top: 30px;
        border-top: 1px solid #30363d;
        padding-top: 30px;
      }

      .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .results-header h2 {
        color: #c9d1d9;
      }

      .summary {
        display: flex;
        gap: 20px;
      }

      .summary-item {
        padding: 10px 20px;
        border-radius: 6px;
        font-weight: 600;
      }

      .summary-item.errors {
        background: rgba(248, 81, 73, 0.1);
        color: #f85149;
        border: 1px solid #f85149;
      }

      .summary-item.warnings {
        background: rgba(242, 211, 91, 0.1);
        color: #f2d35b;
        border: 1px solid #f2d35b;
      }

      .summary-item:last-child {
        background: rgba(88, 166, 255, 0.1);
        color: #58a6ff;
        border: 1px solid #58a6ff;
      }

      .error-list {
        list-style: none;
      }

      .error-item {
        background: #0d1117;
        border-left: 4px solid;
        margin-bottom: 10px;
        padding: 15px;
        border-radius: 0 6px 6px 0;
        border: 1px solid #30363d;
        border-left-width: 4px;
      }

      .error-item.error {
        border-left-color: #f85149;
      }

      .error-item.warning {
        border-left-color: #f2d35b;
      }

      .error-item.info {
        border-left-color: #58a6ff;
        background: #0a0c10;
      }

      .error-item.success {
        border-left-color: #3fb950;
      }

      .error-line {
        font-weight: 600;
        color: #c9d1d9;
        margin-bottom: 5px;
      }

      .error-message {
        color: #8b949e;
      }

      .loading {
        display: none;
        text-align: center;
        padding: 30px;
      }

      .loading.active {
        display: block;
      }

      .spinner {
        border: 4px solid #30363d;
        border-top: 4px solid #58a6ff;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .filename {
        background: #21262d;
        color: #c9d1d9;
        padding: 5px 10px;
        border-radius: 6px;
        display: inline-block;
        margin-left: 10px;
        font-size: 14px;
        border: 1px solid #30363d;
      }

      details {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 10px;
      }

      summary {
        color: #58a6ff;
        cursor: pointer;
      }

      pre {
        color: #8b949e;
        background: #0a0c10;
        padding: 10px;
        border-radius: 4px;
      }

      @media (max-width: 768px) {
        .header h1 {
          font-size: 2em;
        }

        .button-group {
          flex-direction: column;
        }

        .btn,
        .file-label {
          width: 100%;
          text-align: center;
        }

        .code-editor-container {
          flex-direction: column;
        }

        .line-numbers {
          border-right: none;
          border-bottom: 1px solid #30363d;
          text-align: left;
          padding: 10px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Code Syntax Analyzer</h1>
        <p>Paste your code below to check for syntax errors and warnings</p>
      </div>

      <div class="main-content">
        <div class="input-section">
          <div class="language-selector">
            <label for="language">Language:</label>
            <select id="language">
              <option value="auto">Auto-detect</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="cpp">C++</option>
              <option value="javascript">JavaScript</option>
              <option value="html">HTML</option>
            </select>
          </div>

          <div class="code-editor-container">
            <div class="line-numbers" id="lineNumbers">1</div>
            <textarea
              id="codeInput"
              class="code-input"
              placeholder="Paste your code here..."
              oninput="updateLineNumbers()"
              onscroll="syncScroll()"
            ></textarea>
          </div>

          <div class="button-group">
            <button class="btn btn-primary" onclick="analyzeCode()">
              Analyze Code
            </button>
            <button class="btn btn-secondary" onclick="clearCode()">
              Clear
            </button>
            <label for="fileInput" class="file-label">Upload File</label>
            <input
              type="file"
              id="fileInput"
              class="file-input"
              accept=".py,.java,.cpp,.js,.html,.txt"
              onchange="handleFileUpload(this)"
            />
          </div>
        </div>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Analyzing your code...</p>
        </div>

        <div class="results-section" id="results" style="display: none">
          <div class="results-header">
            <h2>Analysis Results</h2>
            <div class="summary" id="summary"></div>
          </div>

          <div id="errorList"></div>
        </div>
      </div>
    </div>

    <script>
      // Line numbers functionality
      function updateLineNumbers() {
        const textarea = document.getElementById("codeInput");
        const lineNumbers = document.getElementById("lineNumbers");
        const lines = textarea.value.split("\n").length;
        let lineNumberHtml = "";
        for (let i = 1; i <= lines; i++) {
          lineNumberHtml += i + "\n";
        }
        lineNumbers.innerText = lineNumberHtml;
      }

      function syncScroll() {
        const textarea = document.getElementById("codeInput");
        const lineNumbers = document.getElementById("lineNumbers");
        lineNumbers.scrollTop = textarea.scrollTop;
      }

      // Initialize line numbers on page load
      document.addEventListener("DOMContentLoaded", function () {
        updateLineNumbers();
      });

      async function analyzeCode() {
        const code = document.getElementById("codeInput").value;
        const language = document.getElementById("language").value;

        if (!code.trim()) {
          alert("Please enter some code to analyze.");
          return;
        }

        showLoading();

        try {
          const response = await fetch("http://127.0.0.1:5000/analyze", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ code, language }),
          });

          const data = await response.json();

          if (data.success) {
            displayResults(data);
          } else {
            alert("Error: " + data.error);
          }
        } catch (error) {
          alert("Error connecting to server: " + error.message);
        } finally {
          hideLoading();
        }
      }

      async function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("file", file);

        showLoading();

        try {
          const response = await fetch("http://127.0.0.1:5000/analyze-file", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (data.success) {
            document.getElementById("codeInput").value = data.code || "";
            updateLineNumbers(); // Update line numbers after setting code
            displayResults(data);
          } else {
            alert("Error: " + data.error);
          }
        } catch (error) {
          alert("Error uploading file: " + error.message);
        } finally {
          hideLoading();
          input.value = ""; // Reset file input
        }
      }

      function displayResults(data) {
        const results = document.getElementById("results");
        const summary = document.getElementById("summary");
        const errorList = document.getElementById("errorList");

        // Update summary
        summary.innerHTML = `
        <div class="summary-item errors">Errors: ${data.summary.error_count}</div>
        <div class="summary-item warnings">Warnings: ${data.summary.warning_count}</div>
        <div class="summary-item">Language: ${data.language}</div>
    `;

        // Display errors and warnings
        let html = '<ul class="error-list">';

        // Show detected language info
        html += `<li class="error-item info">
        <div class="error-line">📊 Analysis Summary</div>
        <div class="error-message">Language: ${data.language}</div>
        <div class="error-message">Total Errors: ${data.summary.error_count}</div>
        <div class="error-message">Total Warnings: ${data.summary.warning_count}</div>
    </li>`;

        // Show errors
        if (data.errors.length > 0) {
          html += `<li class="error-item error">
            <div class="error-line">❌ ERRORS (${data.errors.length})</div>
        </li>`;

          data.errors.forEach((error, index) => {
            html += `
                <li class="error-item error" style="margin-left: 20px;">
                    <div class="error-line">Error #${index + 1} - Line ${error.line || "?"}, Column ${error.column || "?"}</div>
                    <div class="error-message">${error.message}</div>
                    <div style="font-size: 0.8em; color: #6e7681; margin-top: 5px;">Type: ${error.type || "syntax_error"}</div>
                </li>
            `;
          });
        }

        // Show warnings
        if (data.warnings.length > 0) {
          html += `<li class="error-item warning" style="margin-top: 15px;">
            <div class="error-line">⚠️ WARNINGS (${data.warnings.length})</div>
        </li>`;

          data.warnings.forEach((warning, index) => {
            html += `
                <li class="error-item warning" style="margin-left: 20px;">
                    <div class="error-line">Warning #${index + 1} - Line ${warning.line || "?"}, Column ${warning.column || "?"}</div>
                    <div class="error-message">${warning.message}</div>
                </li>
            `;
          });
        }

        if (data.errors.length === 0 && data.warnings.length === 0) {
          html +=
            '<li class="error-item success"><div class="error-message">✨ No syntax errors or warnings found! Perfect code!</div></li>';
        }

        html += "</ul>";

        // Add raw data for debugging
        if (data.errors.length > 0 || data.warnings.length > 0) {
          html += `<details>
            <summary>🔧 Debug: Show raw error data</summary>
            <pre>${JSON.stringify(data.errors, null, 2)}</pre>
        </details>`;
        }

        errorList.innerHTML = html;
        results.style.display = "block";
        results.scrollIntoView({ behavior: "smooth" });
      }

      function clearCode() {
        document.getElementById("codeInput").value = "";
        document.getElementById("results").style.display = "none";
        updateLineNumbers(); // Reset line numbers
      }

      function showLoading() {
        document.getElementById("loading").classList.add("active");
        document.getElementById("results").style.display = "none";
      }

      function hideLoading() {
        document.getElementById("loading").classList.remove("active");
      }
    </script>
  </body>
</html>
